<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Physics Sandbox</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    width: 100%;
    height: 100%;
    touch-action: none; /* スマホのスワイプによる画面スクロールを完全に防止 */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}
canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// コンテキストメニュー（右クリック長押しメニュー）を禁止
canvas.addEventListener("contextmenu", e => e.preventDefault());

const particles = [];
const fields = [];
const walls = [];

// --- ジェスチャ判定用の状態管理 ---
const DRAG_THRESHOLD = 20;   // 指のわずかなブレを許容するため、少し大きめに設定
const LONG_PRESS_TIME = 400; // 長押し判定時間(ms)

let inputState = 'IDLE'; // 'IDLE', 'WAITING', 'DRAGGING', 'LONG_PRESS'
let startX = 0;
let startY = 0;
let currX = 0;
let currY = 0;
let pressTimer = null;

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.r = 10;
    }

    update() {
        for (const f of fields) {
            let dx = f.x - this.x;
            let dy = f.y - this.y;
            let d2 = dx * dx + dy * dy;

            if (d2 < 400) d2 = 400;

            let d = Math.sqrt(d2);
            let force = f.strength / d2;

            this.vx += force * dx / d;
            this.vy += force * dy / d;
        }

        // 速度リミッター（物理演算が破綻しないように制限）
        const speed = Math.hypot(this.vx, this.vy);
        if (speed > 15) {
            this.vx = (this.vx / speed) * 15;
            this.vy = (this.vy / speed) * 15;
        }

        this.x += this.vx;
        this.y += this.vy;

        // 画面端の反射
        if (this.x < this.r) { this.x = this.r; this.vx *= -1; }
        if (this.x > canvas.width - this.r) { this.x = canvas.width - this.r; this.vx *= -1; }
        if (this.y < this.r) { this.y = this.r; this.vy *= -1; }
        if (this.y > canvas.height - this.r) { this.y = canvas.height - this.r; this.vy *= -1; }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    }
}

class Field {
    constructor(x, y, strength, color) {
        this.x = x;
        this.y = y;
        this.strength = strength;
        this.color = color;
        this.r = 12;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

class Wall {
    constructor(x1, y1, x2, y2) {
        this.x1 = x1;
        this.y1 = y1;
        this.x2 = x2;
        this.y2 = y2;
    }

    draw() {
        ctx.beginPath();
        ctx.moveTo(this.x1, this.y1);
        ctx.lineTo(this.x2, this.y2);
        ctx.strokeStyle = "#AAA";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.stroke();
    }
}

// --- 入力制御 (元のジェスチャー操作を正確に再現) ---
canvas.addEventListener("pointerdown", e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;

    startX = e.clientX;
    startY = e.clientY;
    currX = startX;
    currY = startY;
    
    inputState = 'WAITING';

    pressTimer = setTimeout(() => {
        if (inputState === 'WAITING') {
            inputState = 'LONG_PRESS';
            if (navigator.vibrate) navigator.vibrate(20);
        }
    }, LONG_PRESS_TIME);

    canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener("pointermove", e => {
    if (inputState === 'IDLE') return;

    currX = e.clientX;
    currY = e.clientY;

    if (inputState === 'WAITING') {
        const dist = Math.hypot(currX - startX, currY - startY);
        if (dist > DRAG_THRESHOLD) {
            clearTimeout(pressTimer);
            inputState = 'DRAGGING';
        }
    }
});

canvas.addEventListener("pointerup", e => {
    if (inputState === 'IDLE') return;

    clearTimeout(pressTimer);

    if (inputState === 'WAITING') {
        // タップ（白玉）
        particles.push(new Particle(startX, startY));
    } else if (inputState === 'DRAGGING') {
        // ドラッグ（壁）
        const dist = Math.hypot(currX - startX, currY - startY);
        if (dist > 5) {
            walls.push(new Wall(startX, startY, currX, currY));
        }
    } else if (inputState === 'LONG_PRESS') {
        // 長押し→スワイプ（力場）
        const dx = currX - startX;
        const dist = Math.hypot(currX - startX, currY - startY);
        
        if (dist > 25) {
            if (dx < 0) {
                fields.push(new Field(startX, startY, 120, "red")); // 斥力
            } else {
                fields.push(new Field(startX, startY, -120, "deepskyblue")); // 引力
            }
        }
    }

    inputState = 'IDLE';
    canvas.releasePointerCapture(e.pointerId);
});

canvas.addEventListener("pointercancel", e => {
    clearTimeout(pressTimer);
    inputState = 'IDLE';
    canvas.releasePointerCapture(e.pointerId);
});

// --- 物理演算 (すり抜け防止のためアルゴリズムを強化) ---
function solveParticleCollisions() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i];
            const b = particles[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist === 0) continue;
            const minDist = a.r + b.r;
            if (dist >= minDist) continue;
            
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;
            
            a.x -= nx * overlap * 0.5;
            a.y -= ny * overlap * 0.5;
            b.x += nx * overlap * 0.5;
            b.y += ny * overlap * 0.5;
            
            const avx = a.vx; const avy = a.vy;
            a.vx = b.vx; a.vy = b.vy;
            b.vx = avx; b.vy = avy;
        }
    }
}

// 線の交差判定ではなく、点と線分の最短距離による堅牢な衝突判定に変更
function solveWallCollisions() {
    for (const p of particles) {
        for (const wall of walls) {
            const abx = wall.x2 - wall.x1;
            const aby = wall.y2 - wall.y1;
            const apx = p.x - wall.x1;
            const apy = p.y - wall.y1;
            
            const ab2 = abx * abx + aby * aby;
            if (ab2 === 0) continue;
            
            let t = (apx * abx + apy * aby) / ab2;
            t = Math.max(0, Math.min(1, t)); // 線分上にクランプ
            
            const cx = wall.x1 + t * abx;
            const cy = wall.y1 + t * aby;
            
            const cpx = p.x - cx;
            const cpy = p.y - cy;
            const dist = Math.hypot(cpx, cpy);
            
            if (dist < p.r && dist > 0) {
                const nx = cpx / dist;
                const ny = cpy / dist;
                
                // めり込み解消
                p.x = cx + nx * p.r;
                p.y = cy + ny * p.r;
                
                // 反射ベクトル計算
                const dot = p.vx * nx + p.vy * ny;
                if (dot < 0) { 
                    p.vx -= 2 * dot * nx;
                    p.vy -= 2 * dot * ny;
                }
            }
        }
    }
}

function update() {
    for (const p of particles) p.update();
    solveParticleCollisions();
    solveWallCollisions();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const wall of walls) wall.draw();
    for (const f of fields) f.draw();
    for (const p of particles) p.draw();

    // --- UIオーバーレイ (元のデザインを完全踏襲) ---
    if (inputState === 'DRAGGING') {
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(currX, currY);
        ctx.strokeStyle = "rgba(170, 170, 170, 0.5)";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.stroke();
    } else if (inputState === 'LONG_PRESS') {
        const dx = currX - startX;
        const dist = Math.hypot(currX - startX, currY - startY);
        const isLeft = dist > 25 && dx < 0;
        const isRight = dist > 25 && dx >= 0;

        ctx.beginPath();
        ctx.arc(startX, startY, 5, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(currX, currY);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
        ctx.stroke();

        ctx.font = "14px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // 左（斥力）
        ctx.beginPath();
        ctx.arc(startX - 65, startY, 28, 0, Math.PI * 2);
        ctx.fillStyle = isLeft ? "red" : "rgba(255, 0, 0, 0.2)";
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.fillText("斥力", startX - 65, startY);

        // 右（引力）
        ctx.beginPath();
        ctx.arc(startX + 65, startY, 28, 0, Math.PI * 2);
        ctx.fillStyle = isRight ? "deepskyblue" : "rgba(0, 191, 255, 0.2)";
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.fillText("引力", startX + 65, startY);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
