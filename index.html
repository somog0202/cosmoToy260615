<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Physics Sandbox Pro</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    width: 100%;
    height: 100%;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}
/* スマホ用UIメニューのスタイル */
.menu {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
    background: rgba(255, 255, 255, 0.15);
    padding: 6px 12px;
    border-radius: 30px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.btn {
    border: none;
    outline: none;
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    transition: background 0.2s, transform 0.1s;
}
.btn.active {
    background: #fff;
    color: #111;
}
.btn:active {
    transform: scale(0.95);
}
.btn-clear {
    background: rgba(255, 68, 68, 0.4);
}
.btn-clear:active {
    background: rgba(255, 68, 68, 0.7);
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="menu">
    <button class="btn active" id="mode-particle">● 玉</button>
    <button class="btn" id="mode-wall">─ 壁</button>
    <button class="btn" id="mode-attract">＋ 引力</button>
    <button class="btn" id="mode-repel">－ 斥力</button>
    <button class="btn btn-clear" id="btn-clear">リセット</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// 右クリックメニューを禁止
canvas.addEventListener("contextmenu", e => e.preventDefault());

// 現在の配置モード管理
let currentMode = 'particle'; 
let isDragging = false;
let startX = 0, startY = 0;
let currX = 0, currY = 0;

const particles = [];
const fields = [];
const walls = [];

// UIのイベント設定
document.getElementById('mode-particle').addEventListener('click', (e) => switchMode('particle', e.target));
document.getElementById('mode-wall').addEventListener('click', (e) => switchMode('wall', e.target));
document.getElementById('mode-attract').addEventListener('click', (e) => switchMode('attract', e.target));
document.getElementById('mode-repel').addEventListener('click', (e) => switchMode('repel', e.target));
document.getElementById('btn-clear').addEventListener('click', () => {
    particles.length = 0;
    fields.length = 0;
    walls.length = 0;
});

function switchMode(mode, targetBtn) {
    currentMode = mode;
    document.querySelectorAll('.menu .btn').forEach(btn => {
        if(!btn.classList.contains('btn-clear')) btn.classList.remove('active');
    });
    targetBtn.classList.add('active');
}

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.r = 10;
    }

    update() {
        for (const f of fields) {
            let dx = f.x - this.x;
            let dy = f.y - this.y;
            let d2 = dx * dx + dy * dy;

            if (d2 < 400) d2 = 400; // 近づきすぎた時の計算破綻防止

            let d = Math.sqrt(d2);
            let force = f.strength / d2;

            this.vx += force * dx / d;
            this.vy += force * dy / d;
        }

        // 速度が無限に速くなるのを防ぐリミッター
        const speed = Math.hypot(this.vx, this.vy);
        if (speed > 15) {
            this.vx = (this.vx / speed) * 15;
            this.vy = (this.vy / speed) * 15;
        }

        this.x += this.vx;
        this.y += this.vy;

        // 画面端の衝突リバウンド（少しエネルギーを減衰させて安定化）
        if (this.x < this.r) { this.x = this.r; this.vx *= -0.8; }
        if (this.x > canvas.width - this.r) { this.x = canvas.width - this.r; this.vx *= -0.8; }
        if (this.y < this.r) { this.y = this.r; this.vy *= -0.8; }
        if (this.y > canvas.height - this.r) { this.y = canvas.height - this.r; this.vy *= -0.8; }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = "#FFF";
        ctx.fill();
    }
}

class Field {
    constructor(x, y, strength, color) {
        this.x = x;
        this.y = y;
        this.strength = strength;
        this.color = color;
        this.r = 16;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        // ネオンっぽく光らせるエフェクト
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0; // 他の描画への影響をリセット
    }
}

class Wall {
    constructor(x1, y1, x2, y2) {
        this.x1 = x1;
        this.y1 = y1;
        this.x2 = x2;
        this.y2 = y2;
    }

    draw() {
        ctx.beginPath();
        ctx.moveTo(this.x1, this.y1);
        ctx.lineTo(this.x2, this.y2);
        ctx.strokeStyle = "#AAA";
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.stroke();
    }
}

// --- ポインターイベント (タップ・ドラッグ一元管理) ---
canvas.addEventListener("pointerdown", e => {
    if (e.target !== canvas) return;

    startX = e.clientX;
    startY = e.clientY;
    currX = startX;
    currY = startY;
    isDragging = true;

    canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener("pointermove", e => {
    if (!isDragging) return;
    currX = e.clientX;
    currY = e.clientY;
});

canvas.addEventListener("pointerup", e => {
    if (!isDragging) return;
    isDragging = false;
    canvas.releasePointerCapture(e.pointerId);

    const dist = Math.hypot(currX - startX, currY - startY);

    if (currentMode === 'particle') {
        particles.push(new Particle(startX, startY));
    } else if (currentMode === 'wall') {
        if (dist > 10) { // 短すぎる壁は生成しない
            walls.push(new Wall(startX, startY, currX, currY));
        }
    } else if (currentMode === 'attract') {
        fields.push(new Field(startX, startY, -160, "deepskyblue")); // 引力
    } else if (currentMode === 'repel') {
        fields.push(new Field(startX, startY, 160, "red")); // 斥力
    }
});

canvas.addEventListener("pointercancel", e => {
    isDragging = false;
    canvas.releasePointerCapture(e.pointerId);
});

// --- 物理演算エンジン ---
function solveParticleCollisions() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i];
            const b = particles[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist === 0) continue;
            const minDist = a.r + b.r;
            if (dist >= minDist) continue;
            
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;
            
            // めり込みの補正
            a.x -= nx * overlap * 0.5;
            a.y -= ny * overlap * 0.5;
            b.x += nx * overlap * 0.5;
            b.y += ny * overlap * 0.5;
            
            // 弾性衝突（速度交換）
            const kx = a.vx - b.vx;
            const ky = a.vy - b.vy;
            const p = nx * kx + ny * ky;
            
            if (p > 0) { 
                a.vx -= p * nx;
                a.vy -= p * ny;
                b.vx += p * nx;
                b.vy += p * ny;
            }
        }
    }
}

// 壁との衝突判定（点と線分の最短距離アルゴリズムで、すり抜けを完全防止）
function solveWallCollisions() {
    for (const p of particles) {
        for (const wall of walls) {
            const abx = wall.x2 - wall.x1;
            const aby = wall.y2 - wall.y1;
            const apx = p.x - wall.x1;
            const apy = p.y - wall.y1;
            
            const ab2 = abx * abx + aby * aby;
            if (ab2 === 0) continue;
            
            // 線分に対する射影係数 t を 0〜1 にクランプ
            let t = (apx * abx + apy * aby) / ab2;
            t = Math.max(0, Math.min(1, t));
            
            // 壁の線分上で、最も粒子に近い座標 (cx, cy)
            const cx = wall.x1 + t * abx;
            const cy = wall.y1 + t * aby;
            
            const cpx = p.x - cx;
            const cpy = p.y - cy;
            const dist = Math.hypot(cpx, cpy);
            
            // 衝突判定（半径未満に近づいたら押し戻す）
            if (dist < p.r && dist > 0) {
                const nx = cpx / dist;
                const ny = cpy / dist;
                
                // 位置のめり込み補正
                p.x = cx + nx * p.r;
                p.y = cy + ny * p.r;
                
                // 反射ベクトルの計算
                const dot = p.vx * nx + p.vy * ny;
                if (dot < 0) { 
                    p.vx -= 2 * dot * nx;
                    p.vy -= 2 * dot * ny;
                    
                    // 挙動安定化のために壁反射時は20%減速
                    p.vx *= 0.8;
                    p.vy *= 0.8;
                }
            }
        }
    }
}

function update() {
    for (const p of particles) p.update();
    solveParticleCollisions();
    solveWallCollisions();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const wall of walls) wall.draw();
    for (const f of fields) f.draw();
    for (const p of particles) p.draw();

    // 壁のドラッグ配置中のプレビュー線を描画
    if (isDragging && currentMode === 'wall') {
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(currX, currY);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.stroke();
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
